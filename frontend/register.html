<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol | SmartRec</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page"> <div class="login-container">
        <div class="login-logo">
            <div class="logo__icon">🍳</div>
            <span class="logo__text">SmartRec</span>
        </div>
        
        <h1 class="login-title">Aramıza Katıl</h1>
        <p class="login-desc">Lezzetli tariflere ve akıllı mutfağa ilk adımını at.</p>

        <form id="registerForm" class="login-form">
            <div class="form-group">
                <input type="text" class="input" placeholder="Adınız Soyadınız" required>
            </div>
            <div class="form-group">
                <input type="email" class="input" placeholder="E-posta adresiniz" required>
            </div>
            <div class="form-group">
                <input type="password" class="input" placeholder="Şifre" required>
            </div>
            <div class="form-group">
                <input type="password" class="input" placeholder="Şifreyi doğrula" required>
            </div>
            <button type="submit" class="btn btn--primary" style="width: 100%;">Kayıt Ol</button>
        </form>

        <p class="login-footer">Zaten hesabınız var mı? <a href="login.html" class="text--accent">Giriş Yapın</a></p>
    </div>

</body>
</html>
