<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kayıt Ol | SmartRec</title>
  <!--
    register.html artık ayrı bir sayfa değil.
    Giriş/Kayıt tek bir sayfada tab yapısıyla sunuluyor.
    Bu dosya geriye dönük uyumluluk için login.html'e yönlendirir.
  -->
  <meta http-equiv="refresh" content="0; url=login.html?tab=register" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">
  <div class="login-wrapper">
    <div class="login-container">
      <p style="text-align:center; color: var(--clr-text-muted);">
        Yönlendiriliyorsunuz... <a href="login.html?tab=register" style="color: var(--clr-accent);">Tıklayın</a>
      </p>
    </div>
  </div>
</body>
</html>
