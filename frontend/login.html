<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap | SmartRec</title>
    <link rel="stylesheet" href="css/style.css"> </head>
<body class="login-page">

    <div class="login-container">
        <div class="login-logo">
            <div class="logo__icon">🍳</div>
            <span class="logo__text">SmartRec</span>
        </div>
        
        <h1 class="login-title">Tekrar Hoş Geldiniz</h1>
        <p class="login-desc">Mutfak deneyiminize devam etmek için giriş yapın.</p>

        <form id="loginForm" class="login-form">
            <div class="form-group">
                <input type="email" class="input" placeholder="E-posta adresiniz" required>
            </div>
            <div class="form-group">
                <input type="password" class="input" placeholder="Şifreniz" required>
            </div>
            <button type="submit" class="btn btn--primary" style="width: 100%;">Giriş Yap</button>
        </form>

        <p class="login-footer">Hesabınız yok mu? <a href="register.html" class="text--accent">Kayıt Olun</a></p>
    </div>

</body>
</html>
