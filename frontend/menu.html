<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartRec — Menüler</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <div id="app-header"></div>

  <main class="main-content" style="padding-top: 2rem;">

    <div class="page-header">
      <h1 class="page-title">Tüm <span class="text--accent">Tarifler</span></h1>
      <p class="page-desc">500'den fazla tarif arasından size en uygununu bulun</p>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <div class="filter-bar__tags">
        <button class="filter-btn filter-btn--active" data-filter="all">Tümü</button>
        <button class="filter-btn" data-filter="kolay">⚡ Kolay</button>
        <button class="filter-btn" data-filter="saglikli">🥗 Sağlıklı</button>
        <button class="filter-btn" data-filter="geleneksel">🫕 Geleneksel</button>
        <button class="filter-btn" data-filter="vejetaryen">🌿 Vejetaryen</button>
        <button class="filter-btn" data-filter="tatli">🍮 Tatlı</button>
      </div>
      <div class="filter-bar__sort">
        <select class="select" id="sortSelect">
          <option value="popular">En Popüler</option>
          <option value="newest">En Yeni</option>
          <option value="calories-asc">Kalori (Az→Çok)</option>
          <option value="time-asc">Süre (Az→Çok)</option>
        </select>
      </div>
    </div>

    <p class="results-info" id="resultsInfo">Tüm tarifler gösteriliyor</p>

    <div class="card-grid card-grid--menu" id="menuCards"></div>

    <div class="load-more-wrap">
      <button class="btn btn--outline btn--lg" id="loadMoreBtn">Daha Fazla Yükle</button>
    </div>

  </main>

  <footer class="footer">
    <div class="footer__inner">
      <div class="logo">
        <span class="logo__icon">🍽</span>
        <span class="logo__text">SmartRec</span>
      </div>
      <p class="footer__copy">© 2025 SmartRec. Tüm hakları saklıdır.</p>
    </div>
  </footer>

  <div id="chatbot-root"></div>

  <script type="module">
    import { renderHeader, renderChatbot } from './js/header.js';
    import { initPage } from './js/auth.js';
    import { initPiti } from './js/piti.js';
    import { MOCK_RECIPES, createRecipeCard } from './js/recipes.js';

    document.getElementById('app-header').innerHTML = renderHeader('menu');
    document.getElementById('chatbot-root').innerHTML = renderChatbot();
    initPage();
    initPiti();

    // ─── Durum ───
    let currentFilter = 'all';
    const params = new URLSearchParams(location.search);
    const urlCat = params.get('cat');
    const urlQ   = params.get('q');
    if (urlCat) currentFilter = urlCat;

    // ─── Render ───
    function renderCards(filter = 'all') {
      const grid = document.getElementById('menuCards');
      const info = document.getElementById('resultsInfo');
      if (!grid) return;

      let recipes = [...MOCK_RECIPES];

      if (urlQ) {
        const q = urlQ.toLowerCase();
        recipes = recipes.filter(r =>
          r.title.toLowerCase().includes(q) ||
          r.desc.toLowerCase().includes(q)
        );
      }

      if (filter !== 'all') {
        recipes = recipes.filter(r => r.tags.includes(filter));
      }

      // Sıralama
      const sort = document.getElementById('sortSelect')?.value || 'popular';
      if (sort === 'calories-asc') recipes.sort((a, b) => a.calories - b.calories);
      else if (sort === 'time-asc') recipes.sort((a, b) => parseInt(a.time) - parseInt(b.time));

      grid.innerHTML = recipes.map(r => createRecipeCard(r)).join('');
      if (info) info.textContent = `${recipes.length} tarif gösteriliyor`;

      // Favori butonları
      grid.querySelectorAll('.fav-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const active = btn.classList.toggle('fav-btn--active');
          btn.textContent = active ? '♥' : '♡';
          btn.style.color = active ? '#C44B1C' : '';
        });
      });
    }

    renderCards(currentFilter);

    // URL'den gelen kategoriye göre aktif butonu işaretle
    if (urlCat) {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('filter-btn--active', btn.dataset.filter === urlCat);
      });
    }

    // ─── Filter butonları ───
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('filter-btn--active'));
        btn.classList.add('filter-btn--active');
        currentFilter = btn.dataset.filter;
        renderCards(currentFilter);
      });
    });

    // ─── Sıralama ───
    document.getElementById('sortSelect')?.addEventListener('change', () => renderCards(currentFilter));

    // ─── Daha fazla yükle (mock) ───
    document.getElementById('loadMoreBtn')?.addEventListener('click', (e) => {
      e.target.textContent = 'Tümü Yüklendi';
      e.target.disabled = true;
    });
  </script>
</body>
</html>
